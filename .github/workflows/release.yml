name: Release

on:
  push:
    branches:
      - main
    paths:
      - pyproject.toml
      - src/**
      - .github/workflows/release.yml

jobs:
  check:
    uses: ./.github/workflows/check.yml
    secrets: inherit

  version:
    runs-on: ubuntu-latest
    needs: check
    outputs:
      should_publish: ${{ steps.compare.outputs.should_publish }}
      version: ${{ steps.compare.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Compare version with PyPI
        id: compare
        run: |
          NAME="$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['name'])")"
          VERSION="$(uv version --short)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          STATUS="$(curl -s -o /dev/null -w '%{http_code}' "https://pypi.org/pypi/$NAME/$VERSION/json")"
          if [ "$STATUS" = "404" ]; then
            echo "Version $VERSION not on PyPI; will publish"
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "Version $VERSION already on PyPI (or lookup failed: HTTP $STATUS); skipping publish"
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    runs-on: ubuntu-latest
    needs: version
    if: needs.version.outputs.should_publish == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true

      - name: Build distributions
        run: uv build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    runs-on: ubuntu-latest
    needs: build
    environment: pypi
    permissions:
      id-token: write # PyPI trusted publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    runs-on: ubuntu-latest
    needs: [version, publish]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create tag and GitHub release
        run: |
          TAG="v${{ needs.version.outputs.version }}"
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" dist/* --title "$TAG" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
